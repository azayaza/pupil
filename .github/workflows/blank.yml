name: 📥 Download motion.npz from Google Drive

on:
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: '是否上传为 Artifact'
        required: false
        default: 'true'
        type: boolean

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # ✅ 已修复：移除 cache 选项

      - name: 📦 Install gdown
        run: pip install --upgrade gdown

      - name: ⬇️ Download motion.npz
        run: |
          FILE_ID="1-LXEmUfW80BXYQ0tAZx341PzY8u14Z9Q"
          FILE_NAME="motion.npz"
          
          echo "📥 下载文件：$FILE_NAME"
          echo "🔗 File ID: $FILE_ID"
          
          gdown "${FILE_ID}" -O "$FILE_NAME"
          
          # 验证
          if [ -f "$FILE_NAME" ]; then
            echo "✅ 下载成功！"
            ls -lh "$FILE_NAME"
            file "$FILE_NAME"
          else
            echo "❌ 下载失败"
            exit 1
          fi

      - name: 📤 Upload Artifact
        if: inputs.upload_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: motion-npz-${{ github.run_number }}
          path: motion.npz
          retention-days: 7
